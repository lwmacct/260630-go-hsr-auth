# 默认配置示例文件, 此文件由单元测试生成, 请勿直接修改
# 复制此文件为 config.yaml 并根据需要修改

# 服务端配置
server:
  debug: false # 启用调试日志和诊断信息

  # 数据库配置
  database:
    type: "sqlite" # 数据库类型：sqlite、pgsql
    sqlite: "${APP_DATA:-.local/data}/sqlite.db" # SQLite 数据库文件路径

    # PostgreSQL 连接参数
    pgsql:
      host: "${PGHOST}" # PostgreSQL 主机
      port: "${PGPORT}" # PostgreSQL 端口
      user: "${PGUSER}" # PostgreSQL 用户名
      database: "${PGDATABASE}" # PostgreSQL 数据库名
      password: "${PGPASSWORD}" # PostgreSQL 密码

  # 认证配置
  auth:

    # 运行时管理员用户名列表
    admins:
      - admin

    # 本地账号认证配置
    local:
      login-enabled: true # 是否启用本地账号登录
      registration-enabled: true # 是否允许用户名密码公开注册

    # 第三方登录配置
    oauth:
      enabled: false # 是否启用 OAuth 第三方登录
      auto-register: true # OAuth 首次登录是否自动创建用户
      callback-base-url: "" # OAuth 回调外部基准地址，留空则根据当前请求推断

      # GitHub OAuth 配置
      github:
        enabled: false # 是否启用该 OAuth 提供方
        client-id: "" # OAuth Client ID
        client-secret: "" # OAuth Client Secret

        # OAuth 授权范围
        scopes:
          - read:user
          - user:email
        auth-url: "https://github.com/login/oauth/authorize" # OAuth 授权地址
        token-url: "https://github.com/login/oauth/access_token" # OAuth Token 地址
        userinfo-url: "https://api.github.com/user" # OAuth 用户信息地址

      # Google OAuth 配置
      google:
        enabled: false # 是否启用该 OAuth 提供方
        client-id: "" # OAuth Client ID
        client-secret: "" # OAuth Client Secret

        # OAuth 授权范围
        scopes:
          - openid
          - email
          - profile
        auth-url: "https://accounts.google.com/o/oauth2/v2/auth" # OAuth 授权地址
        token-url: "https://oauth2.googleapis.com/token" # OAuth Token 地址
        userinfo-url: "https://openidconnect.googleapis.com/v1/userinfo" # OAuth 用户信息地址

    # 认证挑战配置
    challenge:
      provider: "image" # 认证挑战提供方：image、hcaptcha、turnstile

      # 图片验证码配置
      image:
        max-challenges: 1024 # 内存中图片验证码最大数量，0 表示不限制

      # hCaptcha 挑战配置
      hcaptcha:
        sitekey: "" # 认证挑战站点公钥
        secret: "" # 认证挑战服务端密钥
        verify-url: "https://api.hcaptcha.com/siteverify" # 认证挑战服务端验证地址

      # Cloudflare Turnstile 挑战配置
      turnstile:
        sitekey: "" # 认证挑战站点公钥
        secret: "" # 认证挑战服务端密钥
        verify-url: "https://challenges.cloudflare.com/turnstile/v0/siteverify" # 认证挑战服务端验证地址

  # HTTP 服务配置
  http:
    listen: ":40318" # HTTP 服务监听地址
    web-root: "${WEB_ROOT:-dist}" # 静态 Web 根目录，留空则不托管前端

    # HTTPS TLS 配置
    tls:
      enabled: false # 是否启用 HTTPS TLS
      cert-file: "${APP_DATA:-.local/data}/ssl/fullchain.pem" # TLS 证书文件路径或 URI
      key-file: "${APP_DATA:-.local/data}/ssl/privkey.pem" # TLS 私钥文件路径或 URI
      poll-interval: 3s # TLS 证书文件重载兜底轮询间隔，未配置时使用默认间隔
    session-ttl: 168h0m0s # HTTP 登录会话有效期

    # 可信 HTTP 反向代理 CIDR/IP 列表，仅这些来源可提供真实客户端 IP 头
    trusted-proxies: []
    read-timeout: 30s # HTTP 读取超时时间
    write-timeout: 30s # HTTP 写入超时时间
    idle-timeout: 2m0s # HTTP 空闲连接超时时间
    max-api-body-bytes: 1048576 # HTTP API 最大请求体字节数，0 表示不限制
